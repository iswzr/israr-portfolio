backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/projects"
public_folder: "/assets/images/projects"

collections:
  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Tagline", name: "tagline", widget: "string", hint: "One line summary e.g. 'Multi-tenant clinic SaaS'" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Power BI / Data", value: "powerbi" }
          - { label: "Full-Stack SaaS", value: "saas" }
          - { label: "Data Analysis", value: "analysis" }
          - { label: "Excel / Reporting", value: "excel" }
          - { label: "Other", value: "other" }
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Live", value: "live" }
          - { label: "In Progress", value: "wip" }
          - { label: "Completed", value: "completed" }
      - { label: "Featured Project?", name: "featured", widget: "boolean", default: false }
      - { label: "Cover Image", name: "cover", widget: "image", required: false }
      - label: "Gallery Images"
        name: "gallery"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Full Write-up", name: "body", widget: "markdown" }
      - label: "Tech Stack"
        name: "stack"
        widget: "list"
        field: { label: "Technology", name: "tech", widget: "string" }
      - { label: "Live URL", name: "live_url", widget: "string", required: false }
      - { label: "GitHub URL", name: "github_url", widget: "string", required: false }
      - label: "Downloadable Files"
        name: "files"
        widget: "list"
        required: false
        fields:
          - { label: "File Label", name: "label", widget: "string", hint: "e.g. Download .pbix file" }
          - { label: "File Path", name: "path", widget: "string", hint: "e.g. /uploads/clinicos-report.pbix" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Sort Order", name: "order", widget: "number", default: 99 }